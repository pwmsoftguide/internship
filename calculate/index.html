<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="calculator-container">
      <h3>Mini Calculator</h3>

      <div class="input-row">
        <input type="number" id="num1" placeholder="Number 1" />

        <select id="operator" title="operator">
          <option value="+">+</option>
          <option value="-">-</option>
          <option value="*">×</option>
          <option value="/">÷</option>
        </select>

        <input type="number" id="num2" placeholder="Number 2" />
      </div>

      <button id="calcButton">Calculate Amount</button>

      <div class="result-box">
        <span class="result-label">Result:</span>
        <span id="finalResult">---</span>
      </div>
    </div>

    <script>
      const num1Input = document.getElementById("num1");
      const num2Input = document.getElementById("num2");
      const operatorInput = document.getElementById("operator");
      const calcButton = document.getElementById("calcButton");
      const finalResult = document.getElementById("finalResult");

      function calcFunciton() {
        const num1 = Number(num1Input.value);
        const num2 = parseFloat(num2Input.value);
        const operator = operatorInput.value;

        if (isNaN(num1) || isNaN(num2)) {
          finalResult.textContent = "Error: Missing Numbers!";
          return;
        }

        let result = 0;

        if (operator === "+") {
          
          result = num1 + num2;
        } else if (operator === "-") {
          result = num1 - num2;
        } else if (operator === "*") {
          result = num1 * num2;
        } else if (operator === "/") {
          if (num2 === 0) {
            finalResult.textContent = "Error: Can't divided by 0!";
            return;
          }
          result = num1 / num2;
        }
        finalResult.textContent = result;
      }

      calcButton.addEventListener("click", calcFunciton);

    </script>
    <!-- <script src="calculate.js"></script> -->
  </body>
</html>
