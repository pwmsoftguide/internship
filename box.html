<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      h1 {
        padding: 100px 200px;
        background-color: aliceblue;
        border-radius: 20px;
      }
      .box {
        width: 700px;
        margin: auto;
        margin-top: 50px;
        background-color: rgb(205, 133, 82);
        padding: 50px;
        border: 10px solid red;
        border-radius: 30px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Content</h1>
    </div>

    <script>
      //Operator Incident
      console.log(5 + 5 * 5 - 4); //26

      console.log(5 + 5 * 5 - 5 / 5); //29

      // //Order of Operations
      console.log((8 / 2) * (2 + 2)); //16
    </script>
  </body>
</html>
